# Deploy static content to GitHub Pages with Telegram secrets
name: Deploy to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Create config.js from secrets
        run: |
          cat > config.js << 'EOF'
          // Google Apps Script Configuration
          window.GOOGLE_SCRIPT_URL = '${{ secrets.GOOGLE_SCRIPT_URL }}';
          EOF
          echo "✅ Created config.js with Google Script URL"
      
      - name: Verify config.js was created
        run: |
          if [ -f config.js ]; then
            echo "✅ config.js exists"
            echo "File size: $(wc -c < config.js) bytes"
          else
            echo "❌ config.js not found!"
            exit 1
          fi
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
